<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"><i data-lucide="heart-pulse"></i></span>
            <div>
              <p class="eyebrow">Medical RAG</p>
              <h1>Документация МИС</h1>
            </div>
          </div>
          <button id="new-chat-button" type="button" class="new-chat-btn" title="Новый чат">
            <i data-lucide="plus"></i>
            <span>Новый чат</span>
          </button>
        </div>

        <section class="panel chat-history-panel">
          <div class="panel-header">
            <h2><i data-lucide="messages-square"></i> Диалоги</h2>
          </div>
          <div id="chat-list" class="chat-list">
            <p class="empty-copy">Диалогов пока нет.</p>
          </div>
        </section>

        <section class="panel system-panel">
          <h2><i data-lucide="activity"></i> Система</h2>
          <dl id="system-info">
            <dt>Status</dt>
            <dd>Загрузка...</dd>
          </dl>
          <button id="index-button" type="button" class="secondary-btn" title="Переиндексировать чанки">
            <i data-lucide="database-zap"></i>
            <span>Переиндексировать</span>
          </button>
          <p id="index-status" class="muted"></p>
        </section>
      </aside>

      <section class="chat">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Ассистент по базе знаний</p>
            <h2>Спросите по документации</h2>
          </div>
        </header>

        <div id="messages" class="messages">
          <article class="message assistant">
            <div class="assistant-avatar" aria-hidden="true"><i data-lucide="stethoscope"></i></div>
            <div class="bubble markdown-body welcome-bubble">
              <strong>Готов искать по документации МИС.</strong>
              <span>Задайте вопрос, а ответ будет подкреплен найденными источниками.</span>
            </div>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-field">
            <textarea
              id="message-input"
              rows="1"
              placeholder="Например: как настроить роли для диспансеризации?"
              required
            ></textarea>
          </div>
          <button id="send-button" type="submit" class="send-btn" title="Отправить">
            <i data-lucide="send-horizontal"></i>
          </button>
          <div class="composer-hint">
            <span>Enter — отправить</span>
            <span>Shift+Enter — новая строка</span>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
